name: CI/CD Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:

  ci:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build and test
        run: mvn -B verify

  cd:
    name: Build and Deploy to ECS
    needs: ci
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Log Docker into Public ECR
        run: |
          aws ecr-public get-login-password --region us-west-2 \
          | docker login --username AWS \
          --password-stdin public.ecr.aws

      - name: Build Docker image
        run: |
          docker build -t payment-processing-system:${{ github.sha }} .
      
      - name: Tag image for Public ECR
        run: |
          docker tag payment-processing-system:${{ github.sha }} \
          public.ecr.aws/k2s7r0o6/payment-processing-system:${{ github.sha }}

      - name: Push image to Public ECR
        run: |
          docker push public.ecr.aws/k2s7r0o6/payment-processing-system:${{ github.sha }}

      - name: Force ECS service deployment
        run: |
          aws ecs update-service \
            --cluster payments-cluster \
            --service payments-task-definition-service-8x3hfcrz \
            --force-new-deployment
