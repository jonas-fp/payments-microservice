name: CI/CD Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:

  ci:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build and test
        run: mvn -B verify

  cd:
    name: Build and Deploy to ECS
    needs: ci
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Log Docker into Public ECR
        run: |
          aws ecr-public get-login-password --region us-east-1 \
          | docker login --username AWS \
          --password-stdin public.ecr.aws

      - name: Build Docker image
        run: |
          docker build -t payment-processing-system:${{ github.sha }} .
      
      - name: Tag image for Public ECR
        run: |
          docker tag payment-processing-system:${{ github.sha }} \
          public.ecr.aws/k2s7r0o6/payment-processing-system:${{ github.sha }}

      - name: Push image to Public ECR
        run: |
          docker push public.ecr.aws/k2s7r0o6/payment-processing-system:${{ github.sha }}

      - name: Capture current ECS task definition
        id: current-task-definition
        run: |
          TASK_DEFINITION_ARN=$(aws ecs describe-services \
            --cluster payments-cluster \
            --services payments-task-definition-service-8x3hfcrz \
            --query 'services[0].taskDefinition' \
            --output text)

          echo "arn=$TASK_DEFINITION_ARN" >> "$GITHUB_OUTPUT"

      - name: Render updated task definition
        id: render-task-definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "${{ steps.current-task-definition.outputs.arn }}" \
            --query taskDefinition \
            --output json > task-definition.json

          jq \
            --arg IMAGE "public.ecr.aws/k2s7r0o6/payment-processing-system:${{ github.sha }}" \
            '
            .containerDefinitions[0].image = $IMAGE
            | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)
            ' task-definition.json > task-definition-rendered.json

          NEW_TASK_DEFINITION_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://task-definition-rendered.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "arn=$NEW_TASK_DEFINITION_ARN" >> "$GITHUB_OUTPUT"

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster payments-cluster \
            --service payments-task-definition-service-8x3hfcrz \
            --task-definition "${{ steps.render-task-definition.outputs.arn }}" \
            --force-new-deployment
